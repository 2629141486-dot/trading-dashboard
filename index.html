<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andy Money</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
* { font-family: 'Noto Sans SC', system-ui, sans-serif; }
.mono { font-family: 'JetBrains Mono', 'Consolas', monospace; }
.account-active { border-left: 3px solid #22c55e; background: rgba(34,197,94,0.08); }
.account-dormant { border-left: 3px solid #6b7280; opacity: 0.55; }
.account-main { border-left: 3px solid #3b82f6; background: rgba(59,130,246,0.1); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.period-btn { transition: all 0.15s; }
.period-btn.active { background: #3b82f6; color: #fff; }
.indicator-btn { transition: all 0.15s; font-size: 11px; }
.indicator-btn.active { background: #1e40af; color: #60a5fa; border-color: #3b82f6; }
@keyframes slideDown { from { max-height:0; opacity:0; } to { max-height:200px; opacity:1; } }
.account-panel { animation: slideDown 0.3s ease; }
</style>
</head>
<body class="bg-black text-gray-100 min-h-screen">

<!-- ═══════════ 顶部大盘总览栏 ═══════════ -->
<div class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
  <div class="flex items-center justify-between px-3 py-1.5">
    <div class="flex items-center gap-1.5">
      <span class="text-sm font-bold text-blue-400 mono">Andy Money</span>
      <span id="topTime" class="text-xs text-gray-500">--</span>
    </div>
    <div id="topBar" class="flex items-center gap-3">
      <!-- JS填充 QQQ/SPY/DJI/NVDA -->
    </div>
    <button onclick="toggleAccounts()" class="text-xs text-gray-400 hover:text-white transition px-2 py-1 rounded border border-gray-700 hover:border-gray-500">
      <i class="fa fa-university"></i> 账户
    </button>
  </div>
</div>

<!-- ═══════════ 账户折叠面板 ═══════════ -->
<div id="accountPanel" class="hidden bg-gray-950 border-b border-gray-800 account-panel">
  <div class="flex gap-3 px-3 py-2 overflow-x-auto">
    <!-- 星财富美股 - 主力 -->
    <div class="account-main flex-shrink-0 w-48 rounded-lg p-3 cursor-pointer" onclick="switchAccount('xf_us')" id="acct-xf_us">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-blue-300"><i class="fa fa-star"></i> 星财富美股</span>
        <span class="text-xs px-1.5 py-0.5 bg-blue-900/60 text-blue-300 rounded">主力</span>
      </div>
      <div class="mono text-xs text-gray-400">持仓: <span id="pos-xf_us">--</span></div>
      <div class="text-xs text-gray-500 mt-0.5">🇺🇸 NASDAQ · NYSE</div>
    </div>
    <!-- 星财富港股 -->
    <div class="account-active flex-shrink-0 w-48 rounded-lg p-3 cursor-pointer" onclick="switchAccount('xf_hk')" id="acct-xf_hk">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-green-300">星财富港股</span>
        <span class="text-xs px-1.5 py-0.5 bg-green-900/60 text-green-300 rounded">活跃</span>
      </div>
      <div class="mono text-xs text-gray-400">持仓: <span id="pos-xf_hk">--</span></div>
      <div class="text-xs text-gray-500 mt-0.5">🇭🇰 HKEX</div>
    </div>
    <!-- 支付宝A股 -->
    <div class="account-active flex-shrink-0 w-48 rounded-lg p-3 cursor-pointer" onclick="switchAccount('alipay')" id="acct-alipay">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-green-300">支付宝A股</span>
        <span class="text-xs px-1.5 py-0.5 bg-green-900/60 text-green-300 rounded">活跃</span>
      </div>
      <div class="mono text-xs text-gray-400">芯片ETF · 国泰君安</div>
      <div class="text-xs text-gray-500 mt-0.5">🇨🇳 SSE · SZSE</div>
    </div>
    <!-- 汇丰美股 - 闲置 -->
    <div class="account-dormant flex-shrink-0 w-48 rounded-lg p-3 cursor-pointer" onclick="switchAccount('hsbc_us')" id="acct-hsbc_us">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-gray-400">汇丰美股</span>
        <span class="text-xs px-1.5 py-0.5 bg-gray-800 text-gray-400 rounded">闲置</span>
      </div>
      <div class="mono text-xs text-gray-500">备用账户</div>
      <div class="text-xs text-gray-600 mt-0.5">🇺🇸 NASDAQ · NYSE</div>
    </div>
  </div>
  <div class="px-3 pb-1 text-xs text-gray-600">汇丰港股 · 后台存档（不展示）</div>
</div>

<!-- ═══════════ 主内容区 ═══════════ -->
<div class="flex h-[calc(100vh-36px)]">
  <!-- 左侧：自选列表 + 资金流向 -->
  <div class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col overflow-hidden">
    <!-- 当前账户 -->
    <div class="p-2 border-b border-gray-800">
      <div class="text-xs text-gray-500">当前账户</div>
      <div class="text-sm font-bold text-blue-300" id="currentAccount">星财富美股</div>
    </div>

    <!-- 自选列表 -->
    <div class="flex-1 overflow-y-auto p-2" id="watchlistContainer">
      <!-- JS填充 -->
    </div>

    <!-- 资金流向 -->
    <div class="border-t border-gray-800 p-2">
      <div class="text-xs text-gray-400 mb-1">💵 资金流向</div>
      <div class="w-full h-32 relative">
        <canvas id="fundFlowChart"></canvas>
      </div>
      <div id="fundFlowDetail" class="text-xs text-gray-500 mt-1 space-y-0.5">
        <!-- JS填充 -->
      </div>
    </div>
  </div>

  <!-- 右侧：主行情区 -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- 基础报价 -->
    <div id="quoteBar" class="flex-shrink-0 bg-gray-950 border-b border-gray-800 px-3 py-2 flex items-center gap-4 text-xs overflow-x-auto">
      <!-- JS填充 -->
    </div>

    <!-- 周期切换栏 -->
    <div class="flex-shrink-0 bg-gray-950 border-b border-gray-800 px-3 py-1 flex items-center gap-1 overflow-x-auto">
      <button class="period-btn active px-2.5 py-1 rounded text-xs" data-period="D" onclick="switchPeriod('D',this)">日K</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="15" onclick="switchPeriod('15',this)">15分钟</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="60" onclick="switchPeriod('60',this)">60分钟</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="5D" onclick="switchPeriod('5D',this)">5日</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="W" onclick="switchPeriod('W',this)">周K</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="M" onclick="switchPeriod('M',this)">月K</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="3M" onclick="switchPeriod('3M',this)">季K</button>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" data-period="12M" onclick="switchPeriod('12M',this)">年K</button>
      <span class="text-gray-600 mx-1">|</span>
      <span class="text-xs text-gray-500">夜盘</span>
      <button class="period-btn px-2.5 py-1 rounded text-xs text-gray-400 hover:text-white hover:bg-gray-800" onclick="switchPeriod('1',this)">实时</button>
    </div>

    <!-- K线图 -->
    <div class="flex-1 relative" id="chartContainer">
      <div id="tvChart" class="w-full h-full"></div>
      <!-- 买卖盘占比条 -->
      <div class="absolute bottom-0 left-0 right-0 h-9 flex text-sm font-bold">
        <div id="buyBar" class="bg-green-700 flex items-center justify-end px-3 transition-all" style="width:55%">买 55%</div>
        <div id="sellBar" class="bg-red-700 flex items-center px-3 transition-all" style="width:45%">卖 45%</div>
      </div>
    </div>

    <!-- 附图指标按钮 -->
    <div class="flex-shrink-0 bg-gray-950 border-t border-gray-800 px-3 py-1.5 flex items-center gap-1.5 overflow-x-auto">
      <button class="indicator-btn active px-2 py-1 rounded border border-blue-700 bg-blue-950 text-blue-300" onclick="toggleIndicator('BOLL',this)">BOLL</button>
      <button class="indicator-btn active px-2 py-1 rounded border border-blue-700 bg-blue-950 text-blue-300" onclick="toggleIndicator('MACD',this)">MACD</button>
      <button class="indicator-btn px-2 py-1 rounded border border-gray-700 text-gray-400 hover:text-white" onclick="toggleIndicator('MA',this)">MA均线</button>
      <button class="indicator-btn px-2 py-1 rounded border border-gray-700 text-gray-400 hover:text-white" onclick="toggleIndicator('KDJ',this)">KDJ</button>
      <button class="indicator-btn px-2 py-1 rounded border border-gray-700 text-gray-400 hover:text-white" onclick="toggleIndicator('RSI',this)">RSI</button>
      <button class="indicator-btn px-2 py-1 rounded border border-gray-700 text-gray-400 hover:text-white" onclick="toggleIndicator('SAR',this)">SAR</button>
      <button class="indicator-btn px-2 py-1 rounded border border-gray-700 text-gray-400 hover:text-white" onclick="toggleIndicator('MAVOL',this)">MAVOL</button>
      <span class="text-gray-600 mx-1 text-xs">|</span>
      <span class="text-xs font-bold">支撑 <span id="supportLevel" class="text-green-400 mono text-sm">--</span></span>
      <span class="text-xs font-bold ml-3">压力 <span id="resistanceLevel" class="text-red-400 mono text-sm">--</span></span>
    </div>
  </div>
</div>

<script>
// ═══════════ 全局状态 ═══════════
let currentSymbol = 'NVDA';
let currentMarket = 'us';
let currentPeriod = 'D';
let activeIndicators = ['BOLL','MACD'];
let cachedPrices = {};
let fundFlowPie = null;

const TV_EXCHANGE = {
  NVDA:'NASDAQ', GEV:'NYSE', MP:'NYSE', ETN:'NYSE', QQQ:'NASDAQ', SPY:'AMEX', DIA:'AMEX', SPCX:'NASDAQ',
  AVAV:'NASDAQ', BE:'NYSE', EOSE:'NASDAQ', LITE:'NASDAQ',
};

// ═══════════ 自选股管理 ═══════════
const WATCHLISTS = {
  xf_us: [
    { symbol:'NVDA', name:'NVIDIA', thesis:'AI算力龙头', weight:'核心' },
    { symbol:'GEV', name:'GE Vernova', thesis:'电力超级周期', weight:'核心' },
    { symbol:'MP', name:'MP Materials', thesis:'稀土盈利拐点', weight:'高赔率' },
    { symbol:'ETN', name:'Eaton', thesis:'数据中心电力', weight:'确定性' },
    { symbol:'AVAV', name:'AeroVironment', thesis:'巡飞弹龙头', weight:'政策' },
    { symbol:'BE', name:'Bloom Energy', thesis:'燃料电池', weight:'弹性' },
    { symbol:'EOSE', name:'Eos Energy', thesis:'长时储能', weight:'高风险' },
    { symbol:'LITE', name:'Lumentum', thesis:'光器件龙头', weight:'弹性' },
  ],
  xf_hk: [
    { symbol:'0981', name:'中芯国际', thesis:'国产芯片龙头', weight:'核心' },
    { symbol:'3899', name:'中集安瑞科', thesis:'氢能储运', weight:'弹性' },
  ],
  alipay: [
    { symbol:'159995', name:'芯片ETF', thesis:'半导体指数', weight:'核心' },
    { symbol:'300308', name:'中际旭创', thesis:'1.6T光模块', weight:'核心' },
    { symbol:'002028', name:'思源电气', thesis:'电力设备', weight:'成长' },
  ],
  hsbc_us: [
    { symbol:'NVDA', name:'NVIDIA', thesis:'备用仓位', weight:'闲置' },
  ],
};

// ═══════════ 账户切换 ═══════════
function switchAccount(acct) {
  document.querySelectorAll('[id^="acct-"]').forEach(el => el.classList.remove('ring-2','ring-blue-500'));
  document.getElementById('acct-'+acct).classList.add('ring-2','ring-blue-500');

  const names = { xf_us:'星财富美股', xf_hk:'星财富港股', alipay:'支付宝A股芯片ETF', hsbc_us:'汇丰美股' };
  document.getElementById('currentAccount').textContent = names[acct];

  const list = WATCHLISTS[acct];
  if (list && list.length > 0) {
    currentSymbol = list[0].symbol;
    currentMarket = acct === 'xf_hk' ? 'hk' : acct === 'alipay' ? 'cn' : 'us';
    renderWatchlist(acct);
    loadChart(currentSymbol, currentMarket);
    updateQuote();
  }
}

function toggleAccounts() {
  const panel = document.getElementById('accountPanel');
  panel.classList.toggle('hidden');
}

// ═══════════ 自选列表渲染 ═══════════
function renderWatchlist(acct) {
  const container = document.getElementById('watchlistContainer');
  const list = WATCHLISTS[acct] || [];
  container.innerHTML = list.map(s => `
    <div class="flex items-center justify-between p-1.5 rounded cursor-pointer hover:bg-gray-800 transition text-xs ${s.symbol === currentSymbol ? 'bg-gray-800 border border-gray-600' : ''}"
         onclick="selectSymbol('${s.symbol}','${acct}')">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1">
          <span class="font-bold mono text-white">${s.symbol}</span>
          <span class="text-gray-400 truncate">${s.name}</span>
        </div>
        <div class="text-gray-500 truncate">${s.thesis}</div>
      </div>
      <div class="text-right ml-1">
        <div class="mono text-white" id="wl-price-${s.symbol}">--</div>
        <div class="mono text-xs" id="wl-change-${s.symbol}">--</div>
      </div>
    </div>
  `).join('');
}

function selectSymbol(sym, acct) {
  currentSymbol = sym;
  currentMarket = acct === 'xf_hk' ? 'hk' : acct === 'alipay' ? 'cn' : 'us';
  renderWatchlist(acct);
  loadChart(sym, currentMarket);
  updateQuote();
}

// ═══════════ 行情数据加载 ═══════════
async function loadPrices() {
  try {
    const resp = await fetch('prices.json?t='+Date.now());
    if (!resp.ok) return;
    cachedPrices = (await resp.json()).stocks || {};
    document.getElementById('topTime').textContent = (await (await fetch('prices.json?t='+Date.now())).json()).timestamp + ' 更新';
    updateAllUI();
  } catch(e) {}
}

function getPrice(sym) {
  const s = cachedPrices[sym];
  if (!s || s.error) return null;
  return s;
}

// ═══════════ 顶部大盘栏 ═══════════
const TOP_BENCHMARKS = ['QQQ','SPY','DIA','NVDA','SPCX'];

function updateTopBar() {
  const bar = document.getElementById('topBar');
  const now = new Date();
  const etHour = now.getUTCHours() - 4; // 美东时间近似
  const session = (etHour >= 9 && etHour < 16) ? '盘中' : (etHour >= 4 && etHour < 9) ? '盘前' : (etHour >= 16 && etHour < 20) ? '盘后' : '休市';
  bar.innerHTML = TOP_BENCHMARKS.map(sym => {
    const p = getPrice(sym);
    if (!p) return `<div class="flex items-center gap-1 text-xs cursor-pointer hover:bg-gray-800 rounded px-1.5 py-0.5 transition" onclick="selectBenchmark('${sym}')"><span class="font-bold mono text-gray-500">${sym}</span><span class="text-gray-600">--</span></div>`;
    const clr = p.change >= 0 ? 'text-green-400' : 'text-red-400';
    const sgn = p.change >= 0 ? '+' : '';
    const active = currentSymbol === sym ? 'bg-gray-800 ring-1 ring-blue-600' : '';
    return `<div class="flex items-center gap-1.5 text-xs cursor-pointer hover:bg-gray-800 rounded px-1.5 py-0.5 transition ${active}" onclick="selectBenchmark('${sym}')">
      <span class="font-bold mono ${currentSymbol === sym ? 'text-blue-300' : ''}">${sym}</span>
      <span class="mono text-gray-300">${p.price.toFixed(2)}</span>
      <span class="mono ${clr}">${sgn}${p.change.toFixed(2)} <span class="text-xs">(${sgn}${p.pct}%)</span></span>
      <span class="text-gray-600 text-xs">${session}</span>
    </div>`;
  }).join('<span class="text-gray-700">|</span>');

  document.getElementById('topTime').textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

function selectBenchmark(sym) {
  currentSymbol = sym;
  currentMarket = 'us';
  loadChart(sym, 'us');
  updateQuote();
}

// ═══════════ 报价栏 ═══════════
function updateQuote() {
  const p = getPrice(currentSymbol);
  const bar = document.getElementById('quoteBar');
  if (!p) { bar.innerHTML = '<span class="text-gray-500">加载中...</span>'; return; }

  const clr = p.change >= 0 ? 'text-green-400' : 'text-red-400';
  const sgn = p.change >= 0 ? '+' : '';
  const currency = p.currency === 'CNY' ? '¥' : p.currency === 'HKD' ? 'HK$' : '$';

  bar.innerHTML = `
    <span class="font-bold mono text-lg">${currentSymbol}</span>
    <span class="mono text-xl font-bold">${currency}${p.price.toFixed(2)}</span>
    <span class="mono ${clr}">${sgn}${p.change.toFixed(2)} (${sgn}${p.pct}%)</span>
    <span class="text-gray-600">|</span>
    <span class="text-gray-400">昨收 <span class="mono text-white">${p.prev.toFixed(2)}</span></span>
    <span class="text-gray-400">最高 <span class="mono text-white">${(p.price*1.02).toFixed(2)}</span></span>
    <span class="text-gray-400">最低 <span class="mono text-white">${(p.price*0.98).toFixed(2)}</span></span>
    <span class="text-gray-400">成交量 <span class="mono text-white">--</span></span>
    <span class="text-gray-400">换手 <span class="mono text-white">--</span></span>
    <span class="text-gray-600">|</span>
    <span class="text-blue-400">盘后 <span class="mono">--</span></span>
  `;

  // 支撑/压力
  const support = (p.price * 0.97).toFixed(2);
  const resist = (p.price * 1.03).toFixed(2);
  document.getElementById('supportLevel').textContent = currency + support;
  document.getElementById('resistanceLevel').textContent = currency + resist;

  // 模拟买卖盘（可从API获取真实数据时替换）
  const buyPct = 45 + Math.random() * 20;
  document.getElementById('buyBar').style.width = buyPct + '%';
  document.getElementById('buyBar').textContent = '买 ' + buyPct.toFixed(0) + '%';
  document.getElementById('sellBar').style.width = (100-buyPct) + '%';
  document.getElementById('sellBar').textContent = '卖 ' + (100-buyPct).toFixed(0) + '%';
}

// ═══════════ 更新所有UI ═══════════
function updateAllUI() {
  updateTopBar();
  updateQuote();
  // 更新自选列表价格
  document.querySelectorAll('[id^="wl-price-"]').forEach(el => {
    const sym = el.id.replace('wl-price-','');
    const p = getPrice(sym);
    if (p) {
      const currency = p.currency === 'CNY' ? '¥' : p.currency === 'HKD' ? 'HK$' : '$';
      el.textContent = currency + p.price.toFixed(2);
      const changeEl = document.getElementById('wl-change-'+sym);
      if (changeEl) {
        const clr = p.change >= 0 ? 'text-green-400' : 'text-red-400';
        const sgn = p.change >= 0 ? '+' : '';
        changeEl.className = 'mono text-xs ' + clr;
        changeEl.textContent = sgn + p.pct + '%';
      }
    }
  });
  // 更新资金流向
  updateFundFlow();
}

// ═══════════ 资金流向 ═══════════
function updateFundFlow() {
  const large = 30 + Math.random() * 20;
  const mid = 25 + Math.random() * 15;
  const small = 100 - large - mid;

  if (fundFlowPie) fundFlowPie.destroy();
  const ctx = document.getElementById('fundFlowChart').getContext('2d');
  fundFlowPie = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['大单流入','中单流入','小单流入'],
      datasets: [{
        data: [large, mid, small],
        backgroundColor: ['#ef4444','#f59e0b','#22c55e'],
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
    }
  });

  document.getElementById('fundFlowDetail').innerHTML = `
    <div>🔴 大单: ${large.toFixed(1)}%  |  🟡 中单: ${mid.toFixed(1)}%  |  🟢 小单: ${small.toFixed(1)}%</div>
  `;
}

// ═══════════ K线图 ═══════════
function getTvSymbol(market, symbol) {
  if (market === 'us') return `${TV_EXCHANGE[symbol] || 'NYSE'}:${symbol}`;
  if (market === 'cn') {
    if (symbol.startsWith('159')) return `SZSE:${symbol}`;
    return `SZSE:${symbol}`;
  }
  return `HKEX:${symbol.padStart(4,'0')}`;
}

function getStudyStr() {
  const studies = [...activeIndicators];
  const codes = {
    BOLL: 'BB%401tv-basicstudies',
    MACD: 'MACD%401tv-basicstudies',
    MA: 'MA%401tv-basicstudies',
    KDJ: 'Stochastic%401tv-basicstudies',
    RSI: 'RSI%401tv-basicstudies',
    SAR: 'PSAR%401tv-basicstudies',
    MAVOL: 'MAVolume%401tv-basicstudies',
  };
  return studies.map(s => codes[s]).filter(Boolean).join('%2C');
}

function loadChart(symbol, market) {
  const tvSymbol = getTvSymbol(market, symbol);
  const studies = getStudyStr();
  const url = `https://s.tradingview.com/widgetembed/?frameElementId=tv_chart&symbol=${tvSymbol}&interval=${currentPeriod}&hidesidetoolbar=1&hidetoptoolbar=0&symboledit=0&studies=${studies}&theme=dark&style=1&timezone=Asia/Shanghai&withdateranges=1&hideideas=1&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=zh_CN&utm_source=andymoney&utm_medium=widget&utm_campaign=chart&utm_term=${tvSymbol}`;

  const container = document.getElementById('tvChart');
  container.innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;" allow="fullscreen"></iframe>`;
}

function switchPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active','bg-blue-600','text-white'));
  document.querySelectorAll('.period-btn').forEach(b => { b.classList.add('text-gray-400'); });
  btn.classList.add('active','bg-blue-600','text-white');
  btn.classList.remove('text-gray-400');
  loadChart(currentSymbol, currentMarket);
}

function toggleIndicator(ind, btn) {
  const idx = activeIndicators.indexOf(ind);
  if (idx >= 0) {
    activeIndicators.splice(idx, 1);
    btn.classList.remove('active','bg-blue-950','text-blue-300','border-blue-700');
    btn.classList.add('border-gray-700','text-gray-400');
  } else {
    activeIndicators.push(ind);
    btn.classList.add('active','bg-blue-950','text-blue-300','border-blue-700');
    btn.classList.remove('border-gray-700','text-gray-400');
  }
  loadChart(currentSymbol, currentMarket);
}

// ═══════════ 初始化 ═══════════
function init() {
  switchAccount('xf_us');
  loadPrices();
  setInterval(loadPrices, 30000);
}

window.addEventListener('DOMContentLoaded', init);
</script>
